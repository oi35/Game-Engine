# Runtime pass budget configuration (milliseconds).
# Supported keys:
#   active_scene / active_quality
#   auto_mode (0/1)
#   visibility_budget_enabled (0/1)
#   hzb_enabled (0/1)
#   compute_dispatch_enabled (0/1)
#   active_tier (low/medium/high)
#   tier_low_scene / tier_low_quality
#   tier_medium_scene / tier_medium_quality
#   tier_high_scene / tier_high_quality
#   total_ms / shadow_ms / main_ms / debug_ms (legacy fallback)
#   profile.<scene>.<quality>.total_ms
#   profile.<scene>.<quality>.shadow_ms
#   profile.<scene>.<quality>.main_ms
#   profile.<scene>.<quality>.debug_ms
#
# During runtime:
#   F5 = cycle target (Total/Shadow/Main/Debug)
#   F6 = decrease selected budget (hold Shift for larger step, auto-save)
#   F7 = increase selected budget (hold Shift for larger step, auto-save)
#   F8 = reload this file
#   F9 = cycle quality preset in current scene
#   F10 = cycle scene preset for current quality
#   F11 = export JSON profiles to assets/config/pass_budgets.json
#   F12 = import JSON profiles from assets/config/pass_budgets.json
#   B = toggle auto profile mode (tier-based)
#   V = toggle visibility budget mode (occlusion-aware culling)
#   H = toggle hierarchical-Z occlusion path
#   C = toggle compute-dispatch path (GPU frustum pass + grouped prototype stages)

active_scene=sample
active_quality=balanced
auto_mode=0
visibility_budget_enabled=1
hzb_enabled=1
compute_dispatch_enabled=1
active_tier=medium
tier_low_scene=sample
tier_low_quality=quality
tier_medium_scene=sample
tier_medium_quality=balanced
tier_high_scene=stress
tier_high_quality=performance

